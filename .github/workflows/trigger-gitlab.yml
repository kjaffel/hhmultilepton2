# .github/workflows/trigger-gitlab.yml
name: Trigger GitLab CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger GitLab pipeline
        run: |
          curl -X POST \
            --fail \
            -F "token=${{ secrets.GITLAB_TRIGGER_TOKEN }}" \
            -F "ref=main" \
            "https://gitlab.cern.ch/api/v4/projects/hh-multileptons-full-analysis%2Fhh-multilepton/trigger/pipeline"
