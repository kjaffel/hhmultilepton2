name: Trigger GitLab CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger GitLab pipeline
        run: |
          curl -X POST \
            -L \
            -v \
            -F "token=${{ secrets.GITLAB_TRIGGER_TOKEN }}" \
            -F "ref=main" \
            "https://gitlab.cern.ch/api/v4/projects/237472/trigger/pipeline" \
            2>&1 || true
